<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 뽀짝 MBTI 테스트 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Gaegu',cursive;
    background:linear-gradient(135deg,#ffe4f2,#e8f5ff);
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:30px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#ff69b4;
    font-size:3rem;
}

.subtitle{
    text-align:center;
    font-size:1.3rem;
}

.question{
    background:#fff8fc;
    padding:15px;
    margin:15px 0;
    border-radius:20px;
    border:3px dashed #ffc0cb;
}

.question p{
    font-size:1.2rem;
    margin-bottom:10px;
}

label{
    display:block;
    margin:5px 0;
    cursor:pointer;
}

button{
    display:block;
    margin:30px auto;
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:#ff8ec7;
    color:white;
    font-size:1.5rem;
    font-family:'Gaegu',cursive;
    cursor:pointer;
}

button:hover{
    background:#ff6db6;
}

.result{
    margin-top:30px;
    padding:25px;
    border-radius:25px;
    background:#f0fff8;
    text-align:center;
    display:none;
}

.mbti{
    font-size:3rem;
    color:#ff69b4;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🐰 뽀짝 MBTI 테스트 🐻</h1>
<p class="subtitle">✨ 32문항으로 알아보는 나의 MBTI ✨</p>

<form id="mbtiForm"></form>

<button onclick="calculateMBTI()">💖 결과 보기 💖</button>

<div class="result" id="result">
    <div class="mbti" id="mbtiType"></div>
    <h2>🌷 성격 설명 🌷</h2>
    <p id="mbtiDesc"></p>
</div>

</div>

<script>

const questions = [

["E","사람들과 함께 있으면 에너지가 충전된다."],
["I","혼자 있는 시간이 꼭 필요하다."],
["E","새로운 사람과 대화하는 것이 즐겁다."],
["I","모임보다 집이 더 좋다."],

["S","현실적인 사실이 중요하다."],
["N","상상하는 것을 좋아한다."],
["S","경험을 통해 배우는 편이다."],
["N","아이디어를 떠올리는 것이 재미있다."],

["T","논리적으로 판단한다."],
["F","감정을 고려해 결정한다."],
["T","객관성이 중요하다."],
["F","사람의 마음이 중요하다."],

["J","계획을 세우는 편이다."],
["P","즉흥적인 편이다."],
["J","마감 전에 미리 끝낸다."],
["P","벼락치기를 자주 한다."],

["E","모임에서 먼저 말을 건다."],
["I","조용히 듣는 편이다."],
["E","활동적인 취미를 좋아한다."],
["I","혼자 즐기는 취미를 좋아한다."],

["S","세부사항을 잘 기억한다."],
["N","큰 그림을 먼저 본다."],
["S","실용적인 것이 중요하다."],
["N","가능성을 중요하게 생각한다."],

["T","비판도 필요하다고 생각한다."],
["F","상대방 기분을 먼저 생각한다."],
["T","정확함이 우선이다."],
["F","배려가 우선이다."],

["J","일정표를 만드는 걸 좋아한다."],
["P","상황에 맞게 움직인다."],
["J","정리가 잘 되어 있다."],
["P","정리보단 자유로운 편이다."]
];

const form=document.getElementById("mbtiForm");

questions.forEach((q,index)=>{
form.innerHTML+=`
<div class="question">
<p>${index+1}. ${q[1]} 🐣</p>
<label><input type="radio" name="q${index}" value="${q[0]}" required> 그렇다 💕</label>
<label><input type="radio" name="q${index}" value=""> 아니다 🌼</label>
</div>
`;
});

const descriptions = {

"INTJ":"전략가형 🦉 독립적이고 목표 지향적이며 계획 수립에 강해요.",
"INTP":"사색가형 📚 분석적이고 호기심이 많으며 새로운 지식을 좋아해요.",
"ENTJ":"통솔자형 👑 리더십이 강하고 목표 달성 능력이 뛰어나요.",
"ENTP":"발명가형 🚀 창의적이고 토론을 즐기며 아이디어가 풍부해요.",

"INFJ":"옹호자형 🌙 깊은 통찰력과 공감 능력을 가진 이상주의자예요.",
"INFP":"중재자형 🌸 따뜻하고 창의적이며 가치관을 중요하게 생각해요.",
"ENFJ":"선도자형 🌻 사람들을 이끄는 능력이 뛰어나고 배려심이 많아요.",
"ENFP":"활동가형 🎈 열정적이고 자유로운 분위기를 좋아해요.",

"ISTJ":"청렴결백형 📖 책임감이 강하고 신뢰할 수 있는 사람이에요.",
"ISFJ":"수호자형 🧸 따뜻하고 헌신적이며 주변 사람을 잘 챙겨요.",
"ESTJ":"경영자형 🏆 체계적이고 현실적이며 추진력이 강해요.",
"ESFJ":"친선도모형 🍰 사교적이고 배려심이 많은 성격이에요.",

"ISTP":"장인형 🔧 문제 해결 능력이 뛰어나고 독립적이에요.",
"ISFP":"예술가형 🎨 감성이 풍부하고 자유로운 영혼이에요.",
"ESTP":"사업가형 ⚡ 행동력이 강하고 도전을 즐겨요.",
"ESFP":"연예인형 🎤 밝고 에너지가 넘치며 사람들과 어울리길 좋아해요."
};

function calculateMBTI(){

let scores={
E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0
};

for(let i=0;i<questions.length;i++){

let answer=document.querySelector(`input[name="q${i}"]:checked`);

if(!answer){
alert("🌸 모든 문항에 답해주세요!");
return;
}

if(answer.value!==""){
scores[answer.value]++;
}else{

let type=questions[i][0];

if(type==="E") scores.I++;
if(type==="I") scores.E++;

if(type==="S") scores.N++;
if(type==="N") scores.S++;

if(type==="T") scores.F++;
if(type==="F") scores.T++;

if(type==="J") scores.P++;
if(type==="P") scores.J++;
}
}

let mbti="";
mbti += scores.E>=scores.I ? "E":"I";
mbti += scores.S>=scores.N ? "S":"N";
mbti += scores.T>=scores.F ? "T":"F";
mbti += scores.J>=scores.P ? "J":"P";

document.getElementById("result").style.display="block";
document.getElementById("mbtiType").innerText="✨ "+mbti+" ✨";
document.getElementById("mbtiDesc").innerText=descriptions[mbti];

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});
}

</script>

</body>
</html>
```
