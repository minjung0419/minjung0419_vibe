<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍀 또또의 로또 뽑기 🍀</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Gaegu', cursive;
        background: linear-gradient(135deg, #ffd6e7, #d6f5ff);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        width: 450px;
    }

    h1 {
        color: #ff69b4;
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.2rem;
        color: #666;
    }

    button {
        background: #ff9ecf;
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 50px;
        font-size: 1.3rem;
        cursor: pointer;
        font-family: 'Gaegu', cursive;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        background: #ff7dbd;
    }

    .numbers {
        margin-top: 25px;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
    }

    .ball {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #ffe066;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.5rem;
        font-weight: bold;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        animation: pop 0.4s ease;
    }

    @keyframes pop {
        from {
            transform: scale(0);
        }
        to {
            transform: scale(1);
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>🍀 로또 번호 뽑기 🍀</h1>
    <p>✨ 행운의 번호를 뽑아보세요 ✨</p>

    <button onclick="generateLotto()">
        🎀 번호 뽑기 🎀
    </button>

    <div class="numbers" id="numbers"></div>
</div>

<script>
function generateLotto() {
    let nums = [];

    while(nums.length < 6) {
        let num = Math.floor(Math.random() * 45) + 1;

        if(!nums.includes(num)) {
            nums.push(num);
        }
    }

    nums.sort((a, b) => a - b);

    const numbersDiv = document.getElementById("numbers");
    numbersDiv.innerHTML = "";

    nums.forEach(num => {
        const ball = document.createElement("div");
        ball.className = "ball";
        ball.textContent = num;
        numbersDiv.appendChild(ball);
    });
}
</script>

</body>
</html>
